# ============================================================
# 錄音檔摘要機器人（免費版）— GitHub Actions 自動排程
# ============================================================
# 費用：$0（公開 repo = 無限分鐘；私有 repo = 每月 2000 分鐘免費）
# 每天台北時間早上 9:00 自動執行
#
# 需要在 GitHub repo Settings → Secrets and variables → Actions
# 加入以下 secrets（詳見 README.md）：
#   必填：GROQ_API_KEY, NOTION_TOKEN, NOTION_DATABASE_ID,
#         GOOGLE_SERVICE_ACCOUNT_JSON
#   選填：GITHUB_DRIVE_FOLDER_ID, SUMMARY_GITHUB_TOKEN
# ============================================================
 
name: 🎙️ 錄音檔摘要機器人（免費版）

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_reprocess:
        description: '強制重新處理所有檔案（清除快取）'
        required: false
        default: 'false'
        type: boolean
      whisper_model:
        description: 'Whisper 模型大小（tiny/base/small/medium）'
        required: false
        default: 'small'
        type: string

jobs:
  run-bot:
    name: 掃描並生成摘要
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝 ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: 安裝 Python 套件
        run: pip install -r requirements.txt

      - name: 快取 Whisper 模型
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-model-${{ github.event.inputs.whisper_model || 'small' }}
          restore-keys: |
            whisper-model-

      - name: 還原已處理記錄
        if: ${{ github.event.inputs.force_reprocess != 'true' }}
        uses: actions/cache@v4
        with:
          path: processed_files.json
          key: processed-files-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            processed-files-${{ github.ref_name }}-

      - name: 清除處理記錄（強制模式）
        if: ${{ github.event.inputs.force_reprocess == 'true' }}
        run: rm -f processed_files.json

      - name: 建立 Google 服務帳號金鑰
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: 建立日誌目錄
        run: mkdir -p logs

      - name: 🚀 執行錄音檔摘要機器人
        env:
          GROQ_API_KEY:                ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:                  llama-3.3-70b-versatile
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          GOOGLE_DRIVE_FOLDER_IDS:     ${{ secrets.GOOGLE_DRIVE_FOLDER_IDS }}
          NOTION_TOKEN:                ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:          ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_TOKEN:                ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          WHISPER_MODEL:               ${{ github.event.inputs.whisper_model || 'small' }}
          WHISPER_LANGUAGE:            zh
          SUMMARY_LANGUAGE:            繁體中文
          PROCESSED_CACHE:             processed_files.json
          HF_TOKEN:                    ${{ secrets.HF_TOKEN }}
          PYTHONUNBUFFERED:            "1"
        run: |
          echo "🕐 開始時間：$(date '+%Y-%m-%d %H:%M:%S')"
          python -u audio_summary_bot.py 2>&1 | tee logs/$(date +%Y%m%d_%H%M%S).log
          EXIT_CODE=$?
          echo "🕐 結束時間：$(date '+%Y-%m-%d %H:%M:%S')"
          exit $EXIT_CODE

      - name: 清除服務帳號金鑰
        if: always()
        run: rm -f service_account.json

      - name: 上傳執行日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
